<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دريفت السيارة - B3R9Y Games</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #000 0%, #222 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #0ff;
      text-shadow: 0 0 8px #0ff;
      overflow: hidden;
    }
    canvas {
      background: #0a0a0a;
      border: 4px solid #0ff;
      box-shadow: 0 0 40px #0ff;
      border-radius: 12px;
    }
    h1 {
      margin: 10px 0 5px;
      font-size: 32px;
    }
    #info {
      font-size: 18px;
      margin: 5px 0 10px;
      text-align: center;
      max-width: 600px;
    }
    #score {
      font-size: 24px;
      margin: 5px;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      padding: 30px 50px;
      border-radius: 15px;
      border: 3px solid #f00;
      color: #f00;
      font-size: 40px;
      text-align: center;
      text-shadow: 0 0 15px #f00;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🛞 دريفت السيارة من الأعلى! 🛞</h1>
  <div id="info">W: تقديم | S: فرامل/تراجع | A/D: دوران<br>حاول تبقى في الطريق وتدريفت بقوة!</div>
  <div id="score">النقاط: 0 | السرعة: 0 km/h</div>
  <canvas id="canvas" width="600" height="700"></canvas>
  <div id="gameOver">
    انتهى الدريفت! 💥<br>
    <span id="finalScore">0</span> نقاط<br><br>
    اضغط SPACE لإعادة البدء
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');

    // السيارة
    let car = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      width: 30,
      height: 60,
      angle: 0,
      speed: 0,
      vx: 0,
      vy: 0,
      acceleration: 0.25,
      friction: 0.96,
      turnSpeed: 0.05,
      maxSpeed: 6,
      driftFactor: 0.89   // أقل = دريفت أقوى
    };

    // الطريق المنحني
    let roadOffset = 0;
    const roadWidth = 220;

    // حالة اللعبة
    let score = 0;
    let gameRunning = true;
    let keys = {};

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (!gameRunning && e.key === ' ') resetGame();
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function resetGame() {
      car.x = canvas.width / 2;
      car.y = canvas.height / 2;
      car.angle = 0;
      car.speed = 0;
      car.vx = 0;
      car.vy = 0;
      score = 0;
      roadOffset = 0;
      gameRunning = true;
      gameOverEl.style.display = 'none';
      scoreEl.textContent = 'النقاط: 0 | السرعة: 0 km/h';
      loop();
    }

    function isOutOfRoad() {
      const roadX = canvas.width / 2 + Math.sin(roadOffset * 0.008) * 90;
      return Math.abs(car.x - roadX) > roadWidth / 2 + car.width / 2;
    }

    function update() {
      if (!gameRunning) return;

      // التحكم
      if (keys['w']) car.speed = Math.min(car.speed + car.acceleration, car.maxSpeed);
      if (keys['s']) car.speed = Math.max(car.speed - car.acceleration * 1.8, -car.maxSpeed / 2);
      if (keys['a']) car.angle -= car.turnSpeed * (Math.abs(car.speed) / 2 + 0.5);
      if (keys['d']) car.angle += car.turnSpeed * (Math.abs(car.speed) / 2 + 0.5);

      // فيزياء
      const fx = Math.cos(car.angle);
      const fy = Math.sin(car.angle);
      car.vx += fx * car.speed * 0.12;
      car.vy += fy * car.speed * 0.12;
      car.vx *= car.friction * car.driftFactor;
      car.vy *= car.friction * car.driftFactor;
      car.x += car.vx;
      car.y += car.vy;

      // wrap around
      if (car.x > canvas.width) car.x -= canvas.width;
      if (car.x < 0) car.x += canvas.width;
      if (car.y > canvas.height) car.y -= canvas.height;
      if (car.y < 0) car.y += canvas.height;

      // تحريك الطريق
      roadOffset += Math.abs(car.speed) * 1.8;

      // خروج عن الطريق → game over
      if (isOutOfRoad()) {
        gameRunning = false;
        finalScoreEl.textContent = score;
        gameOverEl.style.display = 'block';
        return;
      }

      // نقاط (سرعة + دريفت جانبي)
      const driftBonus = Math.abs(car.vx - fx * car.speed) * 8;
      score += Math.floor(Math.abs(car.speed) * 2 + driftBonus);
      scoreEl.textContent = `النقاط: ${score} | السرعة: ${Math.floor(Math.abs(car.speed) * 25)} km/h`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // رسم الطريق
      ctx.strokeStyle = '#444';
      ctx.lineWidth = roadWidth;
      ctx.beginPath();
      for (let i = -100; i < canvas.height + 100; i += 10) {
        const curve = Math.sin((roadOffset + i) * 0.008) * 90;
        const x = canvas.width / 2 + curve;
        const y = i;
        if (i === -100) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();

      // خطوط بيضاء وسط الطريق
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 6;
      ctx.setLineDash([25, 25]);
      ctx.beginPath();
      for (let i = -100; i < canvas.height + 100; i += 10) {
        const curve = Math.sin((roadOffset + i) * 0.008) * 90;
        const x = canvas.width / 2 + curve;
        const y = i;
        if (i === -100) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // رسم السيارة
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle);
      ctx.fillStyle = '#00aaff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 20;
      ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-10, -25, 20, 12); // مقدمة
      ctx.fillRect(-10, 13, 20, 12);  // مؤخرة
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      if (gameRunning) requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
