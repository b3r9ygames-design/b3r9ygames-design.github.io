<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دريفت السيارة - B3R9Y Games</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #000 0%, #222 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #0ff;
      text-shadow: 0 0 8px #0ff;
      overflow: hidden;
    }
    canvas {
      background: #0a0a0a;
      border: 4px solid #0ff;
      box-shadow: 0 0 40px #0ff;
      border-radius: 12px;
      cursor: pointer;
    }
    h1 { margin: 10px 0 5px; font-size: 32px; }
    #info { font-size: 18px; margin: 5px 0 10px; text-align: center; max-width: 600px; }
    #score { font-size: 24px; margin: 5px; }
    #instructions { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,255,255,0.2); padding: 10px; border-radius: 10px; font-size: 16px; }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      padding: 30px 50px;
      border-radius: 15px;
      border: 3px solid #f00;
      color: #f00;
      font-size: 36px;
      text-align: center;
      text-shadow: 0 0 15px #f00;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🛞 دريفت السيارة من الأعلى! 🛞</h1>
  <div id="info">اضغط على الكانفاس ثم استخدم W: تقديم | S: فرامل | A/D: دوران</div>
  <div id="score">النقاط: 0 | السرعة: 0 km/h</div>
  <canvas id="canvas" width="600" height="700" tabindex="0"></canvas>
  <div id="instructions">كليك هنا للعب! 👆</div>
  <div id="gameOver">
    انتهى الدريفت! 💥<br>
    <span id="finalScore">0</span> نقاط<br><br>
    اضغط SPACE لإعادة البدء
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const instructionsEl = document.getElementById('instructions');

    // السيارة
    let car = {
      x: 300, y: 350, width: 30, height: 60, angle: 0, speed: 0, vx: 0, vy: 0,
      acceleration: 0.3, friction: 0.96, turnSpeed: 0.06, maxSpeed: 7, driftFactor: 0.88
    };

    let score = 0;
    let gameRunning = true;
    let keys = {};

    // Event listeners على window + canvas (مضمون)
    function addKeyListeners() {
      const handleKeyDown = (e) => { keys[e.key.toLowerCase()] = true; };
      const handleKeyUp = (e) => { keys[e.key.toLowerCase()] = false; };

      window.addEventListener('keydown', handleKeyDown);
      window.addEventListener('keyup', handleKeyUp);
      canvas.addEventListener('keydown', handleKeyDown);
      canvas.addEventListener('keyup', handleKeyUp);
    }

    // Focus تلقائي
    canvas.addEventListener('click', () => {
      canvas.focus();
      instructionsEl.style.display = 'none';
    });
    canvas.focus();
    addKeyListeners();

    window.addEventListener('keydown', (e) => {
      if (!gameRunning && e.key === ' ') {
        e.preventDefault();
        resetGame();
      }
    });

    function resetGame() {
      car = { x: 300, y: 350, width: 30, height: 60, angle: 0, speed: 0, vx: 0, vy: 0, acceleration: 0.3, friction: 0.96, turnSpeed: 0.06, maxSpeed: 7, driftFactor: 0.88 };
      score = 0;
      gameRunning = true;
      gameOverEl.style.display = 'none';
      scoreEl.textContent = 'النقاط: 0 | السرعة: 0 km/h';
    }

    function isOutOfRoad() {
      const curve = Math.sin(Date.now() * 0.001) * 100;
      const roadCenter = 300 + curve;
      return Math.abs(car.x - roadCenter) > 120;
    }

    function update() {
      if (!gameRunning) return;

      // حركة
      if (keys['w']) car.speed = Math.min(car.speed + car.acceleration, car.maxSpeed);
      if (keys['s']) car.speed = Math.max(car.speed - car.acceleration * 2, -car.maxSpeed / 2);
      if (keys['a']) car.angle -= car.turnSpeed * (1 + Math.abs(car.speed) / 3);
      if (keys['d']) car.angle += car.turnSpeed * (1 + Math.abs(car.speed) / 3);

      // فيزياء دريفت
      const fx = Math.cos(car.angle);
      const fy = Math.sin(car.angle);
      car.vx += fx * car.speed * 0.15;
      car.vy += fy * car.speed * 0.15;
      car.vx *= car.friction * car.driftFactor;
      car.vy *= car.friction * car.driftFactor;
      car.x += car.vx;
      car.y += car.vy;

      // Wrap around
      car.x = (car.x + 600) % 600;
      car.y = (car.y + 700) % 700;

      // Game over
      if (isOutOfRoad()) {
        gameRunning = false;
        finalScoreEl.textContent = score;
        gameOverEl.style.display = 'block';
        return;
      }

      // نقاط
      score += Math.floor(Math.abs(car.speed) * 3);
      scoreEl.textContent = `النقاط: ${score} | السرعة: ${Math.floor(Math.abs(car.speed) * 30)} km/h`;
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 700);

      // طريق منحني
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 240;
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i < 800; i += 20) {
        const curve = Math.sin((i * 0.01 + Date.now() * 0.0005)) * 100;
        ctx.lineTo(300 + curve, i - 100);
      }
      ctx.stroke();

      // خطوط وسط
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 8;
      ctx.setLineDash([30, 30]);
      ctx.beginPath();
      for (let i = 0; i < 800; i += 20) {
        const curve = Math.sin((i * 0.01 + Date.now() * 0.0005)) * 100;
        ctx.lineTo(300 + curve, i - 100);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // سيارة (تغير لون لو keys مضغوطة)
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle);
      ctx.fillStyle = keys['w'] ? '#ff0' : (keys['s'] ? '#f80' : '#00aaff');
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 25;
      ctx.fillRect(-15, -30, 30, 60);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-12, -28, 24, 10);
      ctx.fillRect(-12, 18, 24, 10);
      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // ابدأ
    instructionsEl.style.display = 'block';
    setTimeout(() => { instructionsEl.style.display = 'none'; }, 5000);
    loop();
  </script>
</body>
</html>
